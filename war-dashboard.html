<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠ 미-이란 위기 실시간 대시보드 | SPORTON</title>
    <meta name="description" content="미국-이란 전쟁 위기 실시간 뉴스 · 비트코인 · 방산주 · 원자재 · 환율 대시보드">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
    --bg:#07090f;--bg2:#0c1220;--bg3:#111826;--bg4:#18223a;
    --red:#ff2d2d;--red2:#b01010;--orange:#ff7700;--yellow:#ffd700;
    --green:#00d46a;--blue:#3b9eff;
    --text:#dde4f0;--text2:#7a91b3;--text3:#4a5e7a;
    --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
    --border:rgba(255,45,45,0.15);
    --border2:rgba(255,255,255,0.06);
    --glow:0 0 20px rgba(255,45,45,0.15);
}
html,body{height:100%;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px}
a{text-decoration:none;color:inherit}
button{cursor:pointer;border:none;background:none;font-family:var(--sans)}

/* ===== HEADER ===== */
.hdr{
    position:sticky;top:0;z-index:200;
    background:linear-gradient(180deg,rgba(7,0,0,0.98) 0%,rgba(12,18,32,0.95) 100%);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    padding:.65rem 1.25rem;gap:1rem;
}
.hdr-left{display:flex;align-items:center;gap:.75rem}
.hdr-icon{font-size:1.3rem;color:var(--red);animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.hdr-title{font-size:1.05rem;font-weight:700;line-height:1.2}
.hdr-title em{color:var(--red);font-style:normal}
.live-badge{
    background:var(--red);color:#fff;
    font-size:.65rem;font-weight:800;letter-spacing:.12em;
    padding:.18rem .5rem;border-radius:3px;
    box-shadow:0 0 8px rgba(255,45,45,.5);
    animation:blink 2s ease infinite;
}
.hdr-right{display:flex;align-items:center;gap:1.25rem;font-family:var(--mono);font-size:.75rem;color:var(--text2)}
.clock{color:var(--text);font-weight:600}
.cdtimer{display:flex;align-items:center;gap:.3rem}
.cdbar{
    width:40px;height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;
}
.cdbar-fill{height:100%;background:var(--red);border-radius:2px;transition:width 1s linear}
.back-btn{
    display:flex;align-items:center;gap:.35rem;
    color:var(--text2);font-size:.75rem;padding:.3rem .65rem;
    border:1px solid var(--border2);border-radius:5px;transition:.2s;
}
.back-btn:hover{color:var(--text);border-color:rgba(255,255,255,.15)}

/* ===== TICKER ===== */
.ticker-wrap{
    background:linear-gradient(90deg,#1a0000 0%,#110000 100%);
    border-bottom:1px solid rgba(255,0,0,.25);
    overflow:hidden;display:flex;height:32px;
}
.ticker-tag{
    flex-shrink:0;background:var(--red);
    display:flex;align-items:center;padding:0 .85rem;
    font-size:.68rem;font-weight:800;letter-spacing:.12em;color:#fff;
    white-space:nowrap;z-index:2;
    box-shadow:4px 0 12px rgba(255,45,45,.4);
}
.ticker-body{overflow:hidden;flex:1;display:flex;align-items:center}
.ticker-inner{
    display:flex;align-items:center;gap:2.5rem;
    font-size:.8rem;white-space:nowrap;
    animation:scroll-ticker 80s linear infinite;
}
@keyframes scroll-ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{display:flex;align-items:center;gap:.4rem}
.ticker-dot{color:var(--yellow);font-size:.6rem}
.ticker-source{
    color:var(--red);font-size:.65rem;font-weight:700;
    text-transform:uppercase;letter-spacing:.05em;
}

/* ===== MARKET STRIP ===== */
.strip{
    background:var(--bg2);border-bottom:1px solid var(--border2);
    display:flex;align-items:center;gap:0;
    overflow-x:auto;scrollbar-width:none;min-height:38px;
}
.strip::-webkit-scrollbar{display:none}
.strip-item{
    display:flex;align-items:center;gap:.4rem;
    padding:.45rem 1rem;border-right:1px solid var(--border2);
    white-space:nowrap;font-family:var(--mono);font-size:.75rem;flex-shrink:0;
}
.s-label{color:var(--text3);font-size:.65rem;font-weight:700;text-transform:uppercase}
.s-price{color:var(--text);font-weight:600}
.s-chg{font-size:.68rem}
.up{color:var(--green)}
.dn{color:var(--red)}
.nc{color:var(--text2)}

/* ===== MAIN GRID ===== */
.main{display:grid;grid-template-columns:1fr 370px;height:calc(100vh - 108px);overflow:hidden}

/* ===== NEWS PANEL ===== */
.news-pnl{display:flex;flex-direction:column;border-right:1px solid var(--border2);overflow:hidden}
.pnl-hdr{
    display:flex;align-items:center;justify-content:space-between;
    padding:.75rem 1rem;border-bottom:1px solid var(--border2);flex-shrink:0;
}
.pnl-title{
    display:flex;align-items:center;gap:.4rem;
    font-size:.7rem;font-weight:700;text-transform:uppercase;
    letter-spacing:.12em;color:var(--text2);
}
.pnl-actions{display:flex;align-items:center;gap:.6rem}
.refresh-btn{
    display:flex;align-items:center;gap:.3rem;
    color:var(--text2);font-size:.7rem;
    padding:.2rem .55rem;border:1px solid var(--border2);border-radius:4px;
    transition:.2s;
}
.refresh-btn:hover{color:var(--red);border-color:var(--red)}
.refresh-btn.spinning i{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.news-tabs-bar{
    display:flex;gap:.4rem;padding:.6rem 1rem;
    border-bottom:1px solid var(--border2);flex-shrink:0;
    overflow-x:auto;scrollbar-width:none;
}
.news-tabs-bar::-webkit-scrollbar{display:none}
.ntab{
    padding:.25rem .65rem;border:1px solid var(--border2);border-radius:20px;
    font-size:.7rem;color:var(--text2);transition:.2s;white-space:nowrap;flex-shrink:0;
}
.ntab:hover{color:var(--text);border-color:rgba(255,255,255,.2)}
.ntab.active{background:var(--red);border-color:var(--red);color:#fff}
.news-scroll{flex:1;overflow-y:auto;padding:.75rem;display:flex;flex-direction:column;gap:.6rem}
.news-scroll::-webkit-scrollbar{width:4px}
.news-scroll::-webkit-scrollbar-track{background:transparent}
.news-scroll::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}

/* News cards */
.ncard{
    background:var(--bg3);border:1px solid var(--border2);border-radius:8px;
    padding:.85rem;transition:.2s;display:block;
}
.ncard:hover{background:var(--bg4);border-color:rgba(255,45,45,.25);transform:translateX(2px)}
.ncard.brk{border-left:3px solid var(--red)}
.ncard.imp{border-left:3px solid var(--orange)}
.ncard.mkt{border-left:3px solid var(--blue)}
.nc-meta{display:flex;align-items:center;gap:.4rem;margin-bottom:.35rem}
.nc-src{font-size:.65rem;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.05em}
.nc-time{font-size:.65rem;color:var(--text3);margin-left:auto;font-family:var(--mono)}
.nc-badge{
    font-size:.58rem;padding:.1rem .35rem;border-radius:3px;
    font-weight:800;letter-spacing:.06em;
}
.b-brk{background:var(--red);color:#fff}
.b-imp{background:var(--orange);color:#fff}
.b-mkt{background:var(--blue);color:#fff}
.nc-title{font-size:.875rem;font-weight:600;line-height:1.45;margin-bottom:.25rem}
.nc-desc{
    font-size:.75rem;color:var(--text2);line-height:1.5;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
}
.nc-tags{display:flex;gap:.3rem;margin-top:.4rem;flex-wrap:wrap}
.nc-tag{
    font-size:.6rem;padding:.1rem .35rem;background:rgba(255,255,255,.05);
    border-radius:3px;color:var(--text3);
}

/* Empty / Error state */
.empty-state{
    text-align:center;padding:2rem;color:var(--text2);font-size:.82rem;
    display:flex;flex-direction:column;align-items:center;gap:.75rem;
}
.empty-state i{font-size:2rem;color:var(--text3)}

/* ===== MARKET PANEL ===== */
.mkt-pnl{
    background:var(--bg2);overflow-y:auto;
    display:flex;flex-direction:column;
}
.mkt-pnl::-webkit-scrollbar{width:4px}
.mkt-pnl::-webkit-scrollbar-track{background:transparent}
.mkt-pnl::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
.mkt-inner{padding:.85rem;display:flex;flex-direction:column;gap:.85rem}

/* Pentagon Index hero */
.pentagon-box{
    background:linear-gradient(135deg,rgba(255,45,45,.12) 0%,rgba(0,0,0,0) 100%);
    border:1px solid rgba(255,45,45,.25);border-radius:10px;padding:1rem;
    box-shadow:var(--glow);
}
.pent-label{
    font-size:.65rem;color:var(--red);font-weight:800;
    letter-spacing:.14em;text-transform:uppercase;margin-bottom:.25rem;
    display:flex;align-items:center;gap:.35rem;
}
.pent-value{font-family:var(--mono);font-size:1.6rem;font-weight:700;line-height:1}
.pent-chg{font-family:var(--mono);font-size:.85rem;margin-top:.2rem}
.pent-sub{font-size:.65rem;color:var(--text3);margin-top:.3rem}

/* Risk meter */
.risk-box{
    background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:.85rem;
}
.risk-hdr{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;
}
.risk-label{font-size:.65rem;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.risk-value{font-size:.8rem;font-weight:700}
.risk-track{background:rgba(255,255,255,.06);border-radius:4px;height:7px;overflow:hidden;margin-bottom:.35rem}
.risk-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#ffd700 0%,#ff7700 60%,#ff2d2d 100%);transition:width 1.5s ease}
.risk-scale{display:flex;justify-content:space-between;font-size:.6rem;color:var(--text3)}
.risk-text{font-size:.75rem;font-weight:600;margin-top:.4rem}

/* Market sections */
.msec{}
.msec-title{
    display:flex;align-items:center;gap:.35rem;
    font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;
    color:var(--text3);padding:.4rem 0;margin-bottom:.35rem;
    border-bottom:1px solid var(--border2);
}
.msec-title i{color:var(--text2)}
.mrow{
    background:var(--bg3);border:1px solid var(--border2);border-radius:7px;
    display:flex;align-items:center;justify-content:space-between;
    padding:.6rem .8rem;margin-bottom:.35rem;transition:.15s;
}
.mrow:hover{background:var(--bg4)}
.mrow:last-child{margin-bottom:0}
.mrow-left{}
.mrow-sym{font-family:var(--mono);font-weight:700;font-size:.85rem}
.mrow-name{font-size:.63rem;color:var(--text3);margin-top:.06rem}
.mrow-right{text-align:right}
.mrow-price{font-family:var(--mono);font-weight:600;font-size:.88rem}
.mrow-chg{font-family:var(--mono);font-size:.7rem;margin-top:.05rem}

/* flash animations */
@keyframes flash-up{0%{background:rgba(0,212,106,.2)}100%{background:transparent}}
@keyframes flash-dn{0%{background:rgba(255,45,45,.2)}100%{background:transparent}}
.flash-up{animation:flash-up .8s ease}
.flash-dn{animation:flash-dn .8s ease}

/* Loading */
.ld{display:flex;align-items:center;gap:.5rem;color:var(--text3);font-size:.75rem;padding:.5rem .2rem}
.spin{
    width:13px;height:13px;border:2px solid rgba(255,255,255,.08);
    border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;
}

/* ===== MOBILE ===== */
@media(max-width:900px){
    .main{grid-template-columns:1fr;height:auto;overflow:visible}
    .news-pnl{height:70vh;border-right:none;border-bottom:1px solid var(--border2)}
    .mkt-pnl{height:auto;overflow:visible}
    .hdr-right .clock,.hdr-right .cdtimer{display:none}
}
@media(max-width:480px){
    .hdr-title{font-size:.9rem}
    .live-badge{display:none}
}
</style>
</head>

<script>
/* ===================================================
   UTILS
=================================================== */
const $ = id => document.getElementById(id);

function fmt(n, digits=2){
    if(n==null||isNaN(n)) return '—';
    return n.toLocaleString('en-US',{minimumFractionDigits:digits,maximumFractionDigits:digits});
}
function fmtBig(n){
    if(n==null||isNaN(n)) return '—';
    if(Math.abs(n)>=1000) return n.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
    return fmt(n);
}
function chgHtml(pct, prefix=''){
    if(pct==null||isNaN(pct)) return '<span class="nc">—</span>';
    const cls = pct>0?'up':pct<0?'dn':'nc';
    const arrow = pct>0?'▲':pct<0?'▼':'—';
    return `<span class="${cls}">${arrow} ${Math.abs(pct).toFixed(2)}%</span>`;
}
function stripHtml(h){ return h.replace(/<[^>]*>/g,''); }
function timeAgo(dateStr){
    const d = new Date(dateStr);
    if(isNaN(d)) return '';
    const diff = (Date.now()-d)/1000;
    if(diff<60) return `${Math.floor(diff)}초 전`;
    if(diff<3600) return `${Math.floor(diff/60)}분 전`;
    if(diff<86400) return `${Math.floor(diff/3600)}시간 전`;
    return `${Math.floor(diff/86400)}일 전`;
}

/* ===================================================
   CLOCK + COUNTDOWN
=================================================== */
let cdLeft = 60;
let cdTotal = 60;

function updateClock(){
    const now = new Date();
    const kst = new Date(now.getTime() + 9*3600*1000);
    const [h,m,s] = [kst.getUTCHours(),kst.getUTCMinutes(),kst.getUTCSeconds()].map(v=>String(v).padStart(2,'0'));
    $('clockEl').textContent = `KST ${h}:${m}:${s}`;
}

function updateCountdown(){
    cdLeft--;
    if(cdLeft<=0){ cdLeft=cdTotal; refreshAll(); }
    $('cdNum').textContent = cdLeft+'s';
    $('cdFill').style.width = (cdLeft/cdTotal*100)+'%';
}

setInterval(updateClock,1000);
setInterval(updateCountdown,1000);
updateClock();

/* ===================================================
   NEWS FETCH
=================================================== */
const PROXY = 'https://api.allorigins.win/get?url=';
const NEWS_FEEDS = [
    {
        url:'https://news.google.com/rss/search?q=Iran+US+war+military+strike+2026&hl=en-US&gl=US&ceid=US:en',
        label:'Google News EN'
    },
    {
        url:'https://news.google.com/rss/search?q=미국+이란+전쟁+긴장&hl=ko-KR&gl=KR&ceid=KR:ko',
        label:'Google News KO'
    },
    {
        url:'https://feeds.reuters.com/reuters/topNews',
        label:'Reuters'
    }
];

let allNews = [];
let currentFilter = 'all';

const KEYWORDS = {
    iran:    ['iran','이란','tehran','테헤란','khamenei','rouhani','irgc','revolutionary guard'],
    military:['military','missile','strike','bomb','weapon','war','troops','deploy','aircraft','carrier','navy','airstrike','explosion','attack','무기','미사일','폭격','전쟁','군사','공습','공격'],
    market:  ['market','stock','bitcoin','crypto','gold','oil','economy','dollar','fed','inflation','wall street','nasdaq','시장','주가','경제','달러','금리','비트코인','원유'],
    oil:     ['oil','petroleum','opec','crude','energy','gas','pipeline','barrel','원유','석유','에너지','유가','opec'],
};

function classifyNews(item){
    const text = (item.title+' '+(item.description||'')).toLowerCase();
    let breaking = false;
    let type = 'all';
    if(KEYWORDS.iran.some(k=>text.includes(k))) type='iran';
    if(KEYWORDS.military.some(k=>text.includes(k))){ if(type==='all')type='military'; else breaking=true; }
    if(KEYWORDS.oil.some(k=>text.includes(k))){ if(type==='all')type='oil'; }
    if(KEYWORDS.market.some(k=>text.includes(k))){ if(type==='all')type='market'; }
    // Mark as breaking if it has multiple categories or urgent words
    const urgentWords = ['breaking','urgent','alert','속보','긴급','경보','발사','공격 개시','전쟁 선포'];
    if(urgentWords.some(k=>text.includes(k))) breaking=true;
    if(type==='iran'&&(KEYWORDS.military.some(k=>text.includes(k))||KEYWORDS.oil.some(k=>text.includes(k)))) breaking=true;
    return {type, breaking};
}

async function fetchFeed(feed){
    try{
        const resp = await fetch(PROXY + encodeURIComponent(feed.url), {signal:AbortSignal.timeout(8000)});
        const json = await resp.json();
        const xml = new DOMParser().parseFromString(json.contents,'text/xml');
        const items = [...xml.querySelectorAll('item')].slice(0,15);
        return items.map(item=>{
            const title = stripHtml(item.querySelector('title')?.textContent||'');
            const link  = item.querySelector('link')?.textContent||'#';
            const desc  = stripHtml(item.querySelector('description')?.textContent||'');
            const pubDate = item.querySelector('pubDate')?.textContent||'';
            const src   = feed.label;
            const {type,breaking} = classifyNews({title,description:desc});
            return {title,link,desc,pubDate,src,type,breaking};
        }).filter(i=>i.title);
    }catch(e){
        console.warn('Feed failed:',feed.label,e.message);
        return [];
    }
}

async function loadNews(){
    $('refreshBtn').classList.add('spinning');
    try{
        const results = await Promise.allSettled(NEWS_FEEDS.map(f=>fetchFeed(f)));
        const merged = results.flatMap(r=>r.status==='fulfilled'?r.value:[]);
        // Deduplicate by title similarity
        const seen = new Set();
        allNews = merged.filter(n=>{
            const key = n.title.substring(0,40).toLowerCase();
            if(seen.has(key)) return false;
            seen.add(key); return true;
        });
        // Sort: breaking first, then by date
        allNews.sort((a,b)=>{
            if(a.breaking&&!b.breaking) return -1;
            if(!a.breaking&&b.breaking) return 1;
            return new Date(b.pubDate)-new Date(a.pubDate);
        });
        renderNews();
        updateTicker();
        $('lastUpdated').textContent = '갱신: '+new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    }catch(e){
        console.error('News load error:',e);
        $('newsFeed').innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><span>뉴스 로드 실패. 네트워크를 확인하세요.</span></div>';
    }finally{
        $('refreshBtn').classList.remove('spinning');
    }
}

function renderNews(){
    const feed = $('newsFeed');
    const items = currentFilter==='all'
        ? allNews
        : allNews.filter(n=>n.type===currentFilter||(currentFilter==='iran'&&n.breaking));

    if(!items.length){
        feed.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper"></i><span>해당 카테고리 뉴스가 없습니다</span></div>';
        return;
    }
    feed.innerHTML = items.slice(0,30).map(n=>{
        const cls = n.breaking?'brk':n.type==='market'?'mkt':n.type!=='all'?'imp':'';
        const badge = n.breaking
            ? '<span class="nc-badge b-brk">속보</span>'
            : n.type==='market'?'<span class="nc-badge b-mkt">시장</span>'
            : n.type!=='all'?'<span class="nc-badge b-imp">뉴스</span>':'';
        const tags = [n.type!=='all'?'#'+{iran:'이란',military:'군사',market:'시장',oil:'석유'}[n.type]||n.type:'',].filter(Boolean);
        return `<a class="ncard ${cls}" href="${n.link}" target="_blank" rel="noopener">
            <div class="nc-meta">
                <span class="nc-src">${n.src}</span>
                ${badge}
                <span class="nc-time">${timeAgo(n.pubDate)}</span>
            </div>
            <div class="nc-title">${n.title}</div>
            ${n.desc?`<div class="nc-desc">${n.desc.substring(0,120)}...</div>`:''}
            ${tags.length?`<div class="nc-tags">${tags.map(t=>`<span class="nc-tag">${t}</span>`).join('')}</div>`:''}
        </a>`;
    }).join('');
}

function updateTicker(){
    const breaking = allNews.filter(n=>n.breaking).slice(0,8);
    const items = breaking.length ? breaking : allNews.slice(0,8);
    if(!items.length) return;
    const html = [...items,...items].map(n=>
        `<span class="ticker-item">
            <span class="ticker-dot">◆</span>
            <span class="ticker-source">${n.src}</span>
            <span>${n.title}</span>
        </span>`
    ).join('');
    $('tickerInner').innerHTML = html;
    // Reset animation
    $('tickerInner').style.animation='none';
    requestAnimationFrame(()=>{ $('tickerInner').style.animation=''; });
}

// Yahoo Finance via proxy
async function fetchYahooQuote(symbols){
    const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(',')}&fields=regularMarketPrice,regularMarketChangePercent,regularMarketChange,shortName`;
    try{
        const resp = await fetch(YF_PROXY + encodeURIComponent(url), {signal:AbortSignal.timeout(10000)});
        const json = await resp.json();
        const inner = JSON.parse(json.contents);
        return inner?.quoteResponse?.result || [];
    }catch(e){
        console.warn('Yahoo Finance proxy failed:',e.message);
        return null;
    }
}

// Fallback: try alternative allorigins URL
async function fetchYahooFallback(symbols){
    const url = `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${symbols.join(',')}`;
    try{
        const resp = await fetch('https://corsproxy.io/?'+encodeURIComponent(url), {signal:AbortSignal.timeout(10000)});
        const inner = await resp.json();
        return inner?.quoteResponse?.result || [];
    }catch(e){
        return null;
    }
}

async function getYahooData(symbols){
    let data = await fetchYahooQuote(symbols);
    if(!data) data = await fetchYahooFallback(symbols);
    return data;
}

let defenseChgs = [];

async function loadDefense(){
    const syms = ['LMT','RTX','NOC','GD','BA','HII'];
    const data = await getYahooData(syms);
    if(!data){
        $('defSec').innerHTML = errHtml('방산주 데이터 로드 실패');
        $('pentVal').textContent = '—';
        return;
    }
    const rows = data.map(q=>({
        sym: q.symbol,
        name: STOCK_NAMES[q.symbol]||q.shortName||q.symbol,
        price: q.regularMarketPrice,
        chg: q.regularMarketChangePercent,
    }));
    renderMarketRows('defSec', rows, '$');
    // Pentagon Index
    defenseChgs = rows.map(r=>r.chg).filter(v=>v!=null&&!isNaN(v));
    if(defenseChgs.length){
        const avg = defenseChgs.reduce((a,b)=>a+b,0)/defenseChgs.length;
        $('pentVal').textContent = avg>=0?`▲ +${avg.toFixed(2)}%`:`▼ ${avg.toFixed(2)}%`;
        $('pentVal').className = 'pent-value '+(avg>=0?'up':'dn');
        $('pentChg').innerHTML = `평균 주가 변동 · ${rows.length}개 종목`;
        updateRiskMeter();
    }
    updateStrip(rows,'defense');
}

function renderMarketRows(elId, rows, prefixOrFn=''){
    const el = $(elId);
    if(!rows||!rows.length){el.innerHTML=errHtml('데이터 없음');return;}
    el.innerHTML = rows.map(r=>{
        const prefix = typeof prefixOrFn==='function'?prefixOrFn(r.sym):prefixOrFn;
        const cls = r.chg>0?'up':r.chg<0?'dn':'nc';
        const prev = prevPrices[r.sym];
        let flashCls = '';
        if(prev!=null&&r.price!=null){
            if(r.price>prev) flashCls='flash-up';
            else if(r.price<prev) flashCls='flash-dn';
        }
        if(r.price!=null) prevPrices[r.sym]=r.price;
        return `<div class="mrow ${flashCls}">
            <div class="mrow-left">
                <div class="mrow-sym">${r.sym}</div>
                <div class="mrow-name">${r.name||''}</div>
            </div>
            <div class="mrow-right">
                <div class="mrow-price">${prefix}${r.price!=null?fmtBig(r.price):'—'}</div>
                <div class="mrow-chg">${chgHtml(r.chg)}</div>
            </div>
        </div>`;
    }).join('');
}

function errHtml(msg){
    return `<div class="ld" style="color:var(--text3);font-size:.72rem"><i class="fas fa-exclamation-triangle" style="color:var(--orange)"></i> ${msg}</div>`;
}

// Market strip updater
const stripData = {};
function updateStrip(rows, category){
    stripData[category] = rows;
    renderStrip();
}
function renderStrip(){
    const all = Object.values(stripData).flat().filter(r=>r.price);
    if(!all.length) return;
    const stripItems = [
        {sym:'BTC',data:all.find(r=>r.sym==='BTC')},
        {sym:'ETH',data:all.find(r=>r.sym==='ETH')},
        {sym:'Gold (현물)',data:all.find(r=>r.sym==='Gold (현물)')},
        {sym:'WTI 원유',data:all.find(r=>r.sym==='WTI 원유')},
        {sym:'S&P 500',data:all.find(r=>r.sym==='S&P 500')},
        {sym:'KOSPI',data:all.find(r=>r.sym==='KOSPI')},
        {sym:'LMT',data:all.find(r=>r.sym==='LMT')},
        {sym:'RTX',data:all.find(r=>r.sym==='RTX')},
        {sym:'USD/KRW',data:all.find(r=>r.sym==='USD/KRW')},
    ].filter(s=>s.data);

    $('stripEl').innerHTML = stripItems.map(s=>{
        const r = s.data;
        const cls = r.chg>0?'up':r.chg<0?'dn':'nc';
        const arrow = r.chg>0?'▲':r.chg<0?'▼':'—';
        return `<div class="strip-item">
            <span class="s-label">${r.sym}</span>
            <span class="s-price">${r.price?fmtBig(r.price):'—'}</span>
            ${r.chg!=null?`<span class="s-chg ${cls}">${arrow}${Math.abs(r.chg).toFixed(2)}%</span>`:''}
        </div>`;
    }).join('');
}

// Geopolitical risk meter
function updateRiskMeter(){
    // Base risk 72 (reflects current US-Iran high tensions)
    // Adjust based on: defense stocks up → more risk; oil up → more risk; gold up → more risk
    let risk = 72;
    if(defenseChgs.length){
        const avgDef = defenseChgs.reduce((a,b)=>a+b,0)/defenseChgs.length;
        risk += avgDef * 1.5; // defense stocks rising = higher risk
    }
    risk = Math.min(95, Math.max(30, risk));

    $('riskFill').style.width = risk+'%';
    $('riskPct').textContent = risk.toFixed(0)+'%';

    let level, cls;
    if(risk>=85){ level='🔴 매우 위험 — 군사 충돌 임박'; cls='dn'; }
    else if(risk>=70){ level='🟠 고위험 — 외교 협상 결렬 · 군사 긴장'; cls=''; $('riskPct').style.color='var(--orange)'; }
    else if(risk>=50){ level='🟡 중위험 — 긴장 고조 · 경계 강화'; cls=''; $('riskPct').style.color='var(--yellow)'; }
    else{ level='🟢 보통 — 외교 채널 가동 중'; cls='up'; }

    $('riskText').textContent = level;
    $('riskPct').className = 'risk-value '+(cls||'');
    if(risk>=85) $('riskPct').style.color='var(--red)';
    else if(risk>=70) $('riskPct').style.color='var(--orange)';
}
